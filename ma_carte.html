<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>LLDP Network Map</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;600;800&display=swap');
  :root {
    --bg:      #0a0e1a;
    --surface: #111827;
    --border:  #1e2d45;
    --accent:  #00d4ff;
    --text:    #e2e8f0;
    --muted:   #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 16px;
    flex-wrap: wrap;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.05rem;
    color: var(--accent);
  }
  .logo span { color: var(--text); }
  .stats { display: flex; gap: 18px; font-size: 0.7rem; color: var(--muted); }
  .stats strong { color: var(--text); }
  .legend { display: flex; gap: 14px; font-size: 0.7rem; }
  .legend-item { display: flex; align-items: center; gap: 6px; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .controls { display: flex; gap: 8px; }
  .btn {
    background: var(--border); border: 1px solid var(--border);
    color: var(--text); font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem; padding: 5px 12px; border-radius: 4px;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .btn:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }

  .main { display: flex; flex: 1; overflow: hidden; }

  #network {
    flex: 1;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(0,212,255,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(124,58,237,0.04) 0%, transparent 50%),
      var(--bg);
  }

  /* Tier labels overlay */
  #tier-labels {
    position: absolute;
    left: 0; top: 0;
    pointer-events: none;
    width: 90px;
  }

  #sidebar {
    width: 290px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden; flex-shrink: 0;
  }
  .sidebar-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 0.68rem;
    text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted);
  }
  .search-wrap { padding: 10px 14px; border-bottom: 1px solid var(--border); }
  #search {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem; padding: 6px 10px; border-radius: 4px; outline: none;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--muted); }
  #device-info { flex: 1; overflow-y: auto; padding: 14px; }
  .placeholder { color: var(--muted); font-size: 0.74rem; text-align: center; padding-top: 40px; line-height: 2; }
  .info-group { margin-bottom: 16px; }
  .info-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 3px; }
  .info-value { font-size: 0.78rem; color: var(--text); word-break: break-all; }
  .info-value.hi { color: var(--accent); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 0.66rem; font-weight: 600; }
  .badge-spines  { background: rgba(0,212,255,0.15);  color: #00d4ff; }
  .badge-leafs   { background: rgba(16,185,129,0.15); color: #10b981; }
  .badge-hosts   { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .badge-unknown { background: rgba(148,163,184,0.1); color: #94a3b8; }
  .neighbor-item {
    padding: 7px 10px; border: 1px solid var(--border); border-radius: 4px;
    margin-bottom: 5px; font-size: 0.68rem; cursor: pointer; transition: border-color 0.15s;
  }
  .neighbor-item:hover { border-color: var(--accent); }
  .neighbor-name { color: var(--accent); font-weight: 600; margin-bottom: 2px; }
  .neighbor-ports { color: var(--muted); font-size: 0.62rem; }
  #device-info::-webkit-scrollbar { width: 3px; }
  #device-info::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .vis-tooltip {
    background: var(--surface) !important; border: 1px solid var(--border) !important;
    color: var(--text) !important; font-family: 'JetBrains Mono', monospace !important;
    font-size: 0.7rem !important; padding: 8px 12px !important;
    border-radius: 4px !important; box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important;
  }

  /* Tier labels column */
  .tier-col {
    position: absolute; left: 8px;
    font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--muted); writing-mode: horizontal-tb;
    display: flex; flex-direction: column; gap: 0;
    pointer-events: none;
  }
  .tier-tag {
    padding: 3px 7px; border-left: 2px solid;
    background: var(--surface); margin-bottom: 2px; border-radius: 0 3px 3px 0;
    font-size: 0.58rem;
  }
  .tier-spines { border-color: #00d4ff; color: #00d4ff; }
  .tier-leafs  { border-color: #10b981; color: #10b981; }
  .tier-hosts  { border-color: #f59e0b; color: #f59e0b; }
</style>
</head>
<body>

<header>
  <div class="logo">LLDP<span> Network Map</span></div>
  <div class="stats">
    <span>Nœuds <strong id="sn">—</strong></span>
    <span>Liens <strong id="se">—</strong></span>
    <span>Spines <strong id="ss">—</strong></span>
    <span>Leafs <strong id="sl">—</strong></span>
    <span>Hosts <strong id="sh">—</strong></span>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#00d4ff"></div>Spine</div>
    <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div>Leaf</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>Host</div>
    <div class="legend-item"><div class="legend-dot" style="background:#94a3b8"></div>Inconnu</div>
  </div>
  <div class="controls">
    <button class="btn" onclick="network.fit({animation:true})">⊞ Fit</button>
    <button class="btn" onclick="exportPNG()">↓ PNG</button>
  </div>
</header>

<div class="main">
  <div style="position:relative;flex:1;display:flex;">
    <div id="network" style="flex:1;"></div>
    <div id="tier-labels"></div>
  </div>
  <div id="sidebar">
    <div class="sidebar-header">Détail équipement</div>
    <div class="search-wrap">
      <input id="search" type="text" placeholder="Rechercher hostname / IP...">
    </div>
    <div id="device-info">
      <div class="placeholder">Cliquez sur un nœud<br>pour voir ses détails</div>
    </div>
  </div>

// ── Palette ──────────────────────────────────────────────────────────────────
const STYLE = {
  spines:  { color:'#00d4ff', border:'#007a99', shape:'diamond', size:30, level:1 },
  leafs:   { color:'#10b981', border:'#047857', shape:'square',  size:24, level:2 },
  hosts:   { color:'#f59e0b', border:'#b45309', shape:'dot',     size:18, level:3 },
  unknown: { color:'#64748b', border:'#334155', shape:'ellipse', size:18, level:2 }
};

// ── DataSets ─────────────────────────────────────────────────────────────────
const visNodes = new vis.DataSet(RAW_NODES.map(n => {
  const s = STYLE[n.group] || STYLE.unknown;
  return {
    id:    n.id,
    label: n.label,
    level: s.level,
    shape: s.shape,
    size:  s.size,
    color: {
      background: s.color + '25',
      border:     s.border,
      highlight:  { background: s.color + '55', border: s.color },
      hover:      { background: s.color + '40', border: s.color }
    },
    font:              { color: s.color, face: 'JetBrains Mono', size: 11, bold: false },
    borderWidth:       2,
    borderWidthSelected: 3,
    title: `<b>${n.id}</b><br>${n.management_ip}<br>${n.model} · EOS ${n.eos_version}`,
    _raw:  n
  };
}));

const visEdges = new vis.DataSet(RAW_EDGES.map((e, i) => {
  // Lien entre deux nœuds du même tier → courbe horizontale prononcée
  const fromNode = visNodes.get(e.from);
  const toNode   = visNodes.get(e.to);
  const sameLevel = fromNode && toNode && fromNode.level === toNode.level;
  return {
    id:    i,
    from:  e.from,
    to:    e.to,
    // Label court sur 2 lignes, affiché uniquement au hover
    title: `${e.local_interface} ↔ ${e.remote_interface}`,
    label: '',
    font:  { size: 10, color: '#00d4ff', face: 'JetBrains Mono', align: 'middle',
             strokeWidth: 2, strokeColor: '#0a0e1a', bold: false },
    color: {
      color:     sameLevel ? '#7c3aed' : '#1e3a5f',
      highlight: '#00d4ff',
      hover:     '#00d4ff'
    },
    width:          sameLevel ? 2 : 1.5,
    dashes:         sameLevel ? [6, 4] : false,
    hoverWidth:     3,
    selectionWidth: 3,
    smooth: sameLevel
      ? { enabled: true, type: 'curvedCW', roundness: 0.5 }
      : { enabled: true, type: 'cubicBezier', forceDirection: 'vertical', roundness: 0.3 },
    _raw: e
  };
}));

};

document.getElementById('se').textContent = RAW_EDGES.length;
document.getElementById('ss').textContent = RAW_NODES.filter(n => n.group === 'spines').length;
document.getElementById('sl').textContent = RAW_NODES.filter(n => n.group === 'leafs').length;
document.getElementById('sh').textContent = RAW_NODES.filter(n => n.group === 'hosts').length;

// ── Tier labels latéraux ─────────────────────────────────────────────────────
function buildTierLabels() {
  const positions = network.getPositions();
  const tiers = { spines:[], leafs:[], hosts:[] };
  RAW_NODES.forEach(n => {
    const g = n.group;
    if (tiers[g] && positions[n.id]) tiers[g].push(positions[n.id].y);
  });

  const labels = document.getElementById('tier-labels');
  labels.innerHTML = '';
  const entries = [
    { key:'spines', label:'SPINE', cls:'tier-spines' },
    { key:'leafs',  label:'LEAF',  cls:'tier-leafs'  },
    { key:'hosts',  label:'HOST',  cls:'tier-hosts'  }
  ];
  entries.forEach(({ key, label, cls }) => {
    if (!tiers[key].length) return;
    const avgY = tiers[key].reduce((a,b) => a+b, 0) / tiers[key].length;
    const domY  = network.canvasToDOM({ x: 0, y: avgY }).y;
    const tag = document.createElement('div');
    tag.className = `tier-tag ${cls}`;
    tag.textContent = label;
    tag.style.position = 'absolute';
    tag.style.top = `${domY - 10}px`;
    tag.style.left = '8px';
    labels.appendChild(tag);
  });
}
network.on('zoom', buildTierLabels);
network.on('dragEnd', buildTierLabels);

// ── Sidebar ───────────────────────────────────────────────────────────────────
function buildBadge(group) {
  const m = { spines:'badge-spines', leafs:'badge-leafs', hosts:'badge-hosts' };
  return `<span class="badge ${m[group]||'badge-unknown'}">${group}</span>`;
}

  const node = visNodes.get(nodeId);

  const d = node._raw;
  const links = RAW_EDGES
    .filter(e => e.from === nodeId || e.to === nodeId)
    .map(e => ({
      remote:   e.from === nodeId ? e.to   : e.from,
      localIf:  e.from === nodeId ? e.local_interface  : e.remote_interface,
      remoteIf: e.from === nodeId ? e.remote_interface : e.local_interface
    }));

  document.getElementById('device-info').innerHTML = `
    <div class="info-group">
      <div class="info-label">Hostname</div>
      <div class="info-value hi">${d.id}</div>
    </div>
    <div class="info-group">
      <div class="info-label">Groupe</div>
      <div class="info-value">${buildBadge(d.group)}</div>
    </div>
    <div class="info-group">
      <div class="info-label">IP Management</div>
      <div class="info-value">${d.management_ip}</div>
    </div>
    <div class="info-group">
      <div class="info-label">Modèle</div>
      <div class="info-value">${d.model}</div>
    </div>
    <div class="info-group">
      <div class="info-label">EOS Version</div>
      <div class="info-value">${d.eos_version}</div>
    </div>
    <div class="info-group">
      <div class="info-label">Numéro de série</div>
      <div class="info-value">${d.serial}</div>
    </div>
    <div class="info-group">
      <div class="info-label">Liens LLDP (${links.length})</div>
      ${links.map(l => `
        <div class="neighbor-item" onclick="focusNode('${l.remote}')">
          <div class="neighbor-name">${l.remote}</div>
          <div class="neighbor-ports">${l.localIf} ↔ ${l.remoteIf}</div>
        </div>`).join('') || '<div style="color:var(--muted);font-size:.72rem">Aucun voisin</div>'}
    </div>`;
}

network.on('click', p => { if (p.nodes.length) showDevice(p.nodes[0]); });

// Afficher le label interface au hover d'un lien
network.on('hoverEdge', params => {
  const edge = visEdges.get(params.edge);
  if (!edge) return;
  visEdges.update({ id: params.edge, label: `${edge._raw.local_interface} ↔ ${edge._raw.remote_interface}` });
});
network.on('blurEdge', params => {
  visEdges.update({ id: params.edge, label: '' });
});

function focusNode(id) {
  network.selectNodes([id]);
  network.focus(id, { scale: 1.3, animation: { duration: 400, easingFunction: 'easeInOutQuad' } });
  showDevice(id);
}

// ── Recherche ────────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', function() {
  const q = this.value.toLowerCase();
  if (!q) {
    visNodes.forEach(n => visNodes.update({ id: n.id, opacity: 1 }));
    return;
  }
  visNodes.forEach(n => {
    const hit = n.id.toLowerCase().includes(q) || (n._raw.management_ip||'').includes(q);
    visNodes.update({ id: n.id, opacity: hit ? 1 : 0.12 });
  });
  const hit = RAW_NODES.find(n => n.id.toLowerCase().includes(q));
  if (hit) focusNode(hit.id);
});

// ── Export PNG ────────────────────────────────────────────────────────────────
function exportPNG() {
  const c = container.querySelector('canvas');
  if (!c) return;
  const a = document.createElement('a');
  a.download = 'network_map.png';
  a.href = c.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
