- name: Déploiement MLAG (leafs uniquement)
  when: "'leafs' in group_names"
  tags: mlag
  block:
    - name: Générer la config MLAG
      template:
        src: eos_config.j2
        dest: "/tmp/{{ inventory_hostname }}-mlag.conf"

    - name: Appliquer la config MLAG
      eos_config:
        src: "/tmp/{{ inventory_hostname }}-mlag.conf"

    - name: Attendre la convergence MLAG
      pause:
        seconds: 10

    - name: Vérifier le status MLAG
      eos_command:
        commands: show mlag
      register: mlag_output

    - name: Afficher la sortie MLAG
      debug:
        var: mlag_output.stdout_lines